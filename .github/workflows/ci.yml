name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Hosted MCP config (no legacy stdio)
        run: node scripts/check-mcp-config.mjs

      - name: Cross-bundle skill docs consistency
        run: node scripts/check-docs-consistency.mjs

      - name: Unit tests
        run: npm test
