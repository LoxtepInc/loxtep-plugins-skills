name: Audit install docs

on:
  schedule:
    # 1st of each month, 15:00 UTC (~9:00 US Mountain)
    - cron: '0 15 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Run deterministic install-doc audit
        id: audit
        run: node scripts/audit-install-docs.mjs | tee audit-report.json
        continue-on-error: true

      - name: Open issue on drift
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const title = `Install doc drift detected (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              'The monthly install-doc audit found drift. Review and update client READMEs / bundled configs.',
              '',
              '```json',
              JSON.stringify(report, null, 2),
              '```',
              '',
              'Workflow: `.github/workflows/audit-install-docs.yml`',
              'Script: `scripts/audit-install-docs.mjs`',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'install-docs-audit',
              per_page: 5,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Updated audit run:\n\n${body}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['install-docs-audit', 'documentation'],
            });

      - name: Fail workflow when audit failed
        if: steps.audit.outcome == 'failure'
        run: exit 1
